# This config file is used by ros2_control
controller_manager:
  ros__parameters:
    update_rate: 5  # Hz

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController


    ee_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    iris_controller:
      type: forward_command_controller/ForwardCommandController  


    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

arm_controller:
  ros__parameters:
    joints:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
    command_interfaces:
      - position
    state_interfaces:
      - position
      #- velocity

ee_controller:
  ros__parameters:
    joints:
      - Active_Gear_Joint
    command_interfaces:
      - position
    state_interfaces:
      - position
#      - velocity

iris_controller:
  ros__parameters:
    joints:
      - iris_shutter
    interface_name: state